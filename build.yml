name: Build site from Google Sheets

on:
  # Run every 10 minutes
  schedule:
    - cron: '*/10 * * * *'
  # Manual trigger from Actions tab
  workflow_dispatch:
  # Run on push to main (for template/script changes)
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'

# Allow only one build at a time
concurrency:
  group: build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Sheets and build site
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python scripts/build.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html map.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Rebuild from Sheets [skip ci]"
            git push
          fi
