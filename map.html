<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Housing California — Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --indigo: #1E3A6E;
  --indigo-d: #152B54;
  --indigo-x: #0d1e3a;
  --marigold: #F2A30F;
  --pearl: #F2F4F8;
  --brick: #D94F38;
  --sky: #4A78C4;
  --white: #FFFFFF;
  --body-txt: #1C2540;
  --meta-txt: #5A6580;
  --font: 'Sora', system-ui, sans-serif;
}

html, body {
  height: 100%;
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  background: var(--indigo-x);
  overflow: hidden;
}

/* ── PAGE STACK ───────────────────────────────────── */
.page-stack {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

/* ── HEADER ───────────────────────────────────────── */
.site-header {
  background: var(--indigo);
  border-bottom: 3px solid var(--marigold);
  padding: 0.6rem 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 200;
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  text-decoration: none;
}

.header-wordmark .l1 {
  font-weight: 700;
  font-size: 0.85rem;
  color: var(--white);
  letter-spacing: -0.01em;
  display: block;
  line-height: 1.2;
}

.header-wordmark .l2 {
  font-size: 0.7rem;
  color: var(--marigold);
  font-weight: 400;
  display: block;
}

.header-back {
  color: rgba(255,255,255,0.55);
  font-size: 0.78rem;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 0.3rem;
  font-weight: 500;
}
.header-back:hover { color: var(--marigold); }

/* ── LEGEND STRIP ─────────────────────────────────── */
.legend-strip {
  background: var(--indigo-d);
  padding: 0.5rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.55rem;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  flex-shrink: 0;
  z-index: 200;
}
.legend-strip::-webkit-scrollbar { display: none; }

.legend-label {
  font-size: 0.67rem;
  font-weight: 600;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  white-space: nowrap;
  flex-shrink: 0;
  padding-right: 0.2rem;
}

.legend-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.38rem;
  padding: 0.3rem 0.75rem;
  border-radius: 100px;
  border: 1.5px solid rgba(255,255,255,0.12);
  font-family: var(--font);
  font-size: 0.73rem;
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.6);
  pointer-events: none;
  user-select: none;
}

.legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  display: inline-block;
}

.legend-dot-split {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  display: inline-block;
  overflow: hidden;
  position: relative;
}

/* ── MAP AREA ─────────────────────────────────────── */
.map-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#caMap {
  width: 100%;
  height: 100%;
  display: block;
  cursor: default;
  touch-action: none;
}

.map-marker-dot {
  cursor: pointer;
  transition: r 0.15s ease;
}
.map-marker-dot:hover { r: 9px; }

/* All SVG elements are pointer-transparent except the dots themselves */
#caMap * { pointer-events: none; }
#caMap .map-marker-dot { pointer-events: all; }

/* ── DRAWER ───────────────────────────────────────── */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: transparent;
  z-index: 300;
  pointer-events: none;
  transition: background 0.25s;
}
.drawer-overlay.visible {
  background: rgba(10,18,40,0.5);
  pointer-events: auto;
}

.drawer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-radius: 16px 16px 0 0;
  padding: 0 1.25rem 2rem;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
  z-index: 400;
  max-height: 62vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.drawer.open { transform: translateY(0); }

.drawer-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.85rem 0 0.4rem;
  margin-bottom: 0.25rem;
  flex-shrink: 0;
}

.drawer-handle {
  width: 36px; height: 4px;
  background: #D0D5E8;
  border-radius: 2px;
  flex: 1;
  margin: 0 auto;
  max-width: 36px;
}
.drawer-top::before {
  content: '';
  width: 32px;
  flex-shrink: 0;
}

.drawer-close {
  background: var(--pearl);
  border: none;
  border-radius: 50%;
  width: 32px; height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--meta-txt);
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
}
.drawer-close:hover { background: #E0E4F0; color: var(--indigo); }

.drawer-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  margin-bottom: 0.65rem;
}

.drawer-tag-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.2rem 0.58rem;
  border-radius: 100px;
  font-size: 0.67rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border: 1.5px solid transparent;
}

.drawer-name {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--indigo);
  line-height: 1.25;
  letter-spacing: -0.02em;
  margin-bottom: 0.12rem;
}

.drawer-project {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--marigold);
  margin-bottom: 0.5rem;
  letter-spacing: -0.01em;
}

.drawer-location {
  font-size: 0.78rem;
  color: var(--meta-txt);
  margin-bottom: 0.8rem;
  display: flex;
  align-items: center;
  gap: 0.3rem;
  flex-wrap: wrap;
}

/* ── DRAWER MEDIA SLOT ────────────────────────────── */
/* Bleeds edge-to-edge above the card text */
.drawer-media {
  width: calc(100% + 2.5rem);
  margin: 0 -1.25rem 1.1rem;
  height: 172px;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}

.drawer-media img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

/* ── BRANDED PLACEHOLDER ──────────────────────────── */
.drawer-media.ph {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  background: var(--indigo-d);
}

.ph-stripes {
  position: absolute;
  inset: 0;
  /* diagonal stripes in tag color; color set via inline CSS var */
  background: repeating-linear-gradient(
    135deg,
    transparent,
    transparent 18px,
    var(--ph-stripe) 18px,
    var(--ph-stripe) 19px
  );
}

.ph-icon {
  position: relative;
  z-index: 1;
  opacity: 0.55;
}

.ph-text {
  position: relative;
  z-index: 1;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 0.18rem;
}

.ph-org {
  font-family: var(--font);
  font-size: 0.74rem;
  font-weight: 700;
  color: rgba(255,255,255,0.82);
  letter-spacing: -0.01em;
  padding: 0 1rem;
  line-height: 1.3;
}

.ph-region {
  font-family: var(--font);
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.7;
}

/* ── VIDEO MODAL ──────────────────────────────────── */
/* Applied to .modal when showing YouTube content */
.modal.video .modal-img-wrap {
  height: auto;
  padding-bottom: 56.25%; /* 16:9 */
  background: #000;
}

.modal.video .modal-img-gradient { display: none; }

/* No overlap-pull when there's no gradient to merge into */
.modal.video .modal-content { margin-top: 0; }

.video-iframe {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  border: 0;
}

.drawer-divider { height: 1px; background: #E8EBF4; margin: 0.75rem 0; }
.drawer-desc { font-size: 0.86rem; line-height: 1.65; color: #3A4560; }

.drawer-link {
  display: block;
  margin-top: 1.1rem;
  background: var(--indigo);
  color: var(--white);
  text-decoration: none;
  text-align: center;
  padding: 0.82rem;
  border-radius: 8px;
  font-weight: 700;
  font-size: 0.86rem;
  transition: background 0.15s;
}
.drawer-link:hover { background: var(--indigo-d); }

/* ── FULL-SCREEN IMAGE MODAL ──────────────────────── */
.modal {
  position: fixed;
  inset: 0;
  background: var(--white);
  z-index: 500;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.36s cubic-bezier(0.32, 0.72, 0, 1);
  overflow: hidden;
}
.modal.open { transform: translateY(0); }

.modal-img-wrap {
  position: relative;
  width: 100%;
  height: 55vh;
  flex-shrink: 0;
  background: var(--indigo-d);
  overflow: hidden;
}

.modal-img-gradient {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.85) 80%, var(--white) 100%);
  pointer-events: none;
}

.modal-close {
  position: absolute;
  top: 1rem; right: 1rem;
  width: 38px; height: 38px;
  border-radius: 50%;
  border: none;
  background: rgba(15, 30, 60, 0.55);
  backdrop-filter: blur(8px);
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.15s;
  z-index: 10;
}
.modal-close:hover { background: rgba(15, 30, 60, 0.8); }

.modal-content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 1.25rem 2.5rem;
  margin-top: -1.5rem;
  position: relative;
}

/* ── DESKTOP ─────────────────────────────────────── */
@media (min-width: 700px) {
  .drawer {
    position: fixed;
    max-width: 420px;
    left: auto;
    right: 1.25rem;
    bottom: 1.25rem;
    border-radius: 12px;
    max-height: 74vh;
    transform: translateY(12px);
    opacity: 0;
    transition: transform 0.26s cubic-bezier(0.32,0.72,0,1), opacity 0.26s ease;
  }
  .drawer.open { transform: translateY(0); opacity: 1; }
  .drawer-handle { display: none; }
  .drawer-overlay.visible { background: transparent; pointer-events: none; }
  .drawer-top { justify-content: flex-end; padding-top: 0.6rem; }
  .drawer-top::before { display: none; }

  /* On desktop card, image/placeholder sits flush below drawer-top */
  .drawer-media {
    height: 188px;
    width: 100%;
    margin: 0 0 1.1rem;
  }

  .modal {
    inset: auto;
    top: 50%; left: 50%;
    transform: translate(-50%, calc(-50% + 30px));
    opacity: 0;
    pointer-events: none;
    width: min(520px, 90vw);
    max-height: 85vh;
    border-radius: 14px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    transition: transform 0.28s cubic-bezier(0.32,0.72,0,1), opacity 0.28s ease;
  }
  .modal.open { transform: translate(-50%, -50%); opacity: 1; pointer-events: auto; }
  .modal-img-wrap { height: 260px; border-radius: 14px 14px 0 0; }
}
</style>
</head>

<div class="page-stack">

<!-- Header -->
<header class="site-header">
  <a href="index.html" class="header-logo" aria-label="Social Housing California">
    <svg width="34" height="29" viewBox="0 0 52 44" fill="none" aria-hidden="true">

<!-- Legend strip (decorative) -->
<div class="legend-strip" role="list" aria-label="Housing type legend">

    Resident-Owned Park
  </span>
</div>

<!-- Map -->
<div class="map-wrap">
  <svg id="caMap"
    viewBox="-30 -20 480 580"
    preserveAspectRatio="xMidYMid meet"
    role="application"
    aria-label="Interactive map of social housing projects in California">

    <defs id="svgDefs">
      <!-- Ocean diagonal line pattern -->
      <pattern id="oceanLines" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
        <line x1="0" y1="0" x2="0" y2="24" stroke="rgba(74,120,196,0.07)" stroke-width="1"/>
      </pattern>
      <!-- State inner glow -->
      <filter id="stateGlow" x="-5%" y="-5%" width="110%" height="110%">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
      <!-- Marker glow -->
      <filter id="markerGlow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
      <!-- State gradient — Marigold / Golden State -->
      <linearGradient id="stateGrad" x1="0" y1="0" x2="0.3" y2="1">
        <stop offset="0%" stop-color="#F5B830"/>
        <stop offset="100%" stop-color="#D9900C"/>
      </linearGradient>
      <!-- Split gradients injected here by JS -->
    </defs>

    <!-- Ocean background -->
    <rect x="-30" y="-20" width="480" height="580" fill="#0d1c38"/>
    <rect x="-30" y="-20" width="480" height="580" fill="url(#oceanLines)"/>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(5,10,25,0.55)"/>
    </radialGradient>
    <rect x="-30" y="-20" width="480" height="580" fill="url(#vignette)"/>

    <!-- State shadow -->
    <path d="M 12,6 L 4,55 L 4,93 L 15,126 L 27,169 L 48,199 L 57,207 L 61,224 L 72,232 L 80,240 L 85,252 L 76,268 L 76,273 L 96,284 L 99,300 L 108,322 L 118,338 L 132,358 L 138,366 L 147,395 L 153,415 L 165,424 L 183,433 L 210,440 L 229,442 L 241,452 L 252,464 L 260,475 L 270,495 L 279,513 L 283,524 L 374,524 L 378,513 L 378,393 L 359,360 L 286,306 L 233,235 L 172,169 L 172,6 Z"
      fill="#F2A30F" opacity="0.3" filter="url(#stateGlow)" transform="translate(3,4)"/>

    <!-- State body -->

      fill="url(#stateGrad)" stroke="#B87A0A" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Sierra Nevada ridge hint -->

      stroke="rgba(180,110,0,0.25)" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- Central Valley -->
    <ellipse cx="165" cy="290" rx="40" ry="90"
      fill="rgba(255,200,50,0.08)" transform="rotate(-10,165,290)"/>

    <!-- Coast glow -->
    <path d="M 12,6 L 4,55 L 4,93 L 15,126 L 27,169 L 48,199 L 57,207 L 61,224 L 72,232 L 80,240 L 85,252 L 76,268 L 76,273 L 96,284 L 99,300 L 108,322 L 118,338 L 132,358 L 138,366 L 147,395 L 153,415 L 165,424 L 183,433 L 210,440 L 229,442 L 241,452 L 252,464 L 260,475 L 270,495 L 279,513 L 283,524"
      fill="none" stroke="rgba(255,210,80,0.45)" stroke-width="2.5"

<!-- Drawer overlay -->

  <div class="modal-content" id="modalContent"></div>

</div><!-- /.page-stack -->

<script>
// ── TAG CONFIG ────────────────────────────────────────────────────────────
const TAG = {
  clt:        { color: '#FFFFFF', stroke: '#1E3A6E', label: 'Community Land Trust' },
  coop:       { color: '#f07a6a', stroke: '#ffffff', label: 'Limited-Equity Co-op' },
  nonprofit:  { color: '#7aaef0', stroke: '#ffffff', label: 'Mission-Aligned Nonprofit' },
  mobilehome: { color: '#52C98A', stroke: '#1a4a30', label: 'Resident-Owned Park' },
};

// ── LOCATION DATA ─────────────────────────────────────────────────────────
/* BUILD:map_data:START */
const LOCATIONS = [
  {
    id: "sf-clt",
    tags: ["clt"],
    name: "San Francisco Community Land Trust",
    project: "320 14th St.",

// ── PROJECTION ────────────────────────────────────────────────────────────
function project(lng, lat) {
  const x = (lng + 124.5) * (420 / 11);
  const y = (42.1 - lat) * (540 / 9.9);
  return { x: Math.round(x * 10) / 10, y: Math.round(y * 10) / 10 };
}

// ── SVG SETUP ─────────────────────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';
const ringsLayer = document.getElementById('ringsLayer');
const dotsLayer  = document.getElementById('dotsLayer');
const svgDefs    = document.getElementById('svgDefs');

// ── SPLIT-COLOR GRADIENT FACTORY ──────────────────────────────────────────
function ensureSplitGradient(tag1, tag2) {
  const id = `split-${tag1}-${tag2}`;
  if (!document.getElementById(id)) {
    const grad = document.createElementNS(SVG_NS, 'linearGradient');
    grad.setAttribute('id', id);
    grad.setAttribute('x1', '0'); grad.setAttribute('y1', '0');
    grad.setAttribute('x2', '1'); grad.setAttribute('y2', '0');
    const s1 = document.createElementNS(SVG_NS, 'stop');
    s1.setAttribute('offset', '50%');
    s1.setAttribute('stop-color', TAG[tag1]?.color || '#ffffff');
    const s2 = document.createElementNS(SVG_NS, 'stop');
    s2.setAttribute('offset', '50%');
    s2.setAttribute('stop-color', TAG[tag2]?.color || '#ffffff');
    grad.appendChild(s1);
    grad.appendChild(s2);
    svgDefs.appendChild(grad);
  }
  return id;
}

// ── DECONFLICT OVERLAPPING MARKERS ────────────────────────────────────────
(function deconflict() {
  const THRESHOLD = 20;
  const SPIRAL_STEP = 15;
  const MAX_SPIRAL = 8;

  const positions = LOCATIONS.map(loc => {
    const p = project(loc.lng, loc.lat);
    return { id: loc.id, x: p.x, y: p.y, ox: p.x, oy: p.y };
  });

  function dist(a, b) {
    return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
  }
  function conflicts(pos, all, selfId) {
    return all.some(p => p.id !== selfId && dist(p, pos) < THRESHOLD);
  }

  for (let i = 0; i < positions.length; i++) {
    const p = positions[i];
    if (!conflicts(p, positions, p.id)) continue;
    let placed = false;
    for (let step = 1; step <= MAX_SPIRAL && !placed; step++) {
      const angle_count = step * 6;
      for (let a = 0; a < angle_count && !placed; a++) {
        const angle = (a / angle_count) * 2 * Math.PI;
        const r = step * SPIRAL_STEP * 0.6;
        const candidate = { x: p.ox + Math.cos(angle) * r, y: p.oy + Math.sin(angle) * r };
        if (!conflicts(candidate, positions, p.id)) {
          p.x = candidate.x; p.y = candidate.y; placed = true;
        }
      }
    }
  }

  positions.forEach(p => {
    const loc = LOCATIONS.find(l => l.id === p.id);
    if (loc) { loc._svgX = p.x; loc._svgY = p.y; }
  });
})();

// ── BUILD MARKERS ─────────────────────────────────────────────────────────
const markerEls = [];

LOCATIONS.forEach((loc, i) => {
  const raw = project(loc.lng, loc.lat);
  const x = loc._svgX !== undefined ? loc._svgX : raw.x;
  const y = loc._svgY !== undefined ? loc._svgY : raw.y;

  // Determine fill — single or split
  let fillColor, strokeColor;
  if (loc.tags.length >= 2) {
    const gradId = ensureSplitGradient(loc.tags[0], loc.tags[1]);
    fillColor = `url(#${gradId})`;
    // Stroke: blend — use first tag's stroke if light, else white
    strokeColor = TAG[loc.tags[0]]?.stroke || '#ffffff';
  } else {
    const cfg = TAG[loc.tags[0]] || TAG.clt;
    fillColor = cfg.color;
    strokeColor = cfg.stroke;
  }

  const delay = i * 60;

  // Pulse ring
  const ring = document.createElementNS(SVG_NS, 'circle');
  ring.setAttribute('cx', x); ring.setAttribute('cy', y); ring.setAttribute('r', '8');
  ring.setAttribute('fill', 'none');
  ring.setAttribute('stroke', TAG[loc.tags[0]]?.color || '#fff');
  ring.setAttribute('stroke-width', '1.5');
  ring.setAttribute('opacity', '0');
  const animR = document.createElementNS(SVG_NS, 'animate');
  animR.setAttribute('attributeName', 'r');
  animR.setAttribute('from', '8'); animR.setAttribute('to', '22');
  animR.setAttribute('dur', '2.6s'); animR.setAttribute('begin', `${delay}ms`);
  animR.setAttribute('repeatCount', 'indefinite');
  ring.appendChild(animR);
  const animO = document.createElementNS(SVG_NS, 'animate');
  animO.setAttribute('attributeName', 'opacity');
  animO.setAttribute('from', '0.65'); animO.setAttribute('to', '0');
  animO.setAttribute('dur', '2.6s'); animO.setAttribute('begin', `${delay}ms`);
  animO.setAttribute('repeatCount', 'indefinite');
  ring.appendChild(animO);
  ringsLayer.appendChild(ring);

  // Dot
  const dot = document.createElementNS(SVG_NS, 'circle');
  dot.setAttribute('cx', x); dot.setAttribute('cy', y); dot.setAttribute('r', '7');
  dot.setAttribute('fill', fillColor);
  dot.setAttribute('stroke', strokeColor);
  dot.setAttribute('stroke-width', '2');
  dot.setAttribute('class', 'map-marker-dot');
  dot.setAttribute('role', 'button');
  dot.setAttribute('tabindex', '0');
  dot.setAttribute('aria-label', `${loc.name} — ${loc.city}`);
  dot.style.filter = `drop-shadow(0 2px 7px ${TAG[loc.tags[0]]?.color || '#fff'}88)`;

  dot.setAttribute('pointer-events', 'all');

  // Opacity fade-in only — no CSS transform on SVG elements (breaks pointer-event hit regions)
  dot.style.opacity = '0';
  dot.style.transition = `opacity 0.5s ease ${delay}ms`;
  setTimeout(() => { dot.style.opacity = '1'; }, 60);

  dot.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') handleMarkerClick(loc, dot); });
  dotsLayer.appendChild(dot);

  markerEls.push({ loc, ring, dot });
});

// ── DRAWER / MODAL ────────────────────────────────────────────────────────
const drawer        = document.getElementById('drawer');
const overlay       = document.getElementById('drawerOverlay');
const drawerContent = document.getElementById('drawerContent');
const modal         = document.getElementById('modal');
const modalContent  = document.getElementById('modalContent');

function handleMarkerClick(loc, dotEl) {
  // Reset all dots
  markerEls.forEach(m => {
    m.dot.setAttribute('r', '7');
    const c = TAG[m.loc.tags[0]]?.color || '#fff';
    m.dot.style.filter = `drop-shadow(0 2px 7px ${c}88)`;
  });
  // Highlight clicked
  dotEl.setAttribute('r', '9');
  const c = TAG[loc.tags[0]]?.color || '#fff';
  dotEl.style.filter = `drop-shadow(0 3px 12px ${c}cc)`;

  if (loc.youtube) {
    openVideoModal(loc);
  } else {
    openDrawer(loc);
  }
}

// ── YOUTUBE HELPER ────────────────────────────────────────────────────────
function youtubeId(url) {
  const m = url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

// ── MEDIA SLOT ────────────────────────────────────────────────────────────
// Returns HTML string for the image/placeholder at top of drawer card.
function buildMediaSlot(loc) {
  if (loc.img) {
    return `<div class="drawer-media"><img src="${encodeURI(loc.img)}" alt="${loc.name}" loading="lazy"></div>`;
  }

  // Branded placeholder — pick first tag for color theme
  const cfg = TAG[loc.tags[0]] || TAG.clt;
  const isLight = cfg.color === '#FFFFFF';
  const iconColor = isLight ? '#FFFFFF' : cfg.color;
  const regionColor = isLight ? 'rgba(255,255,255,0.7)' : cfg.color;
  const stripeColor = isLight ? 'rgba(255,255,255,0.06)' : `${cfg.color}12`;

  return `
    <div class="drawer-media ph" style="--ph-stripe:${stripeColor}">
      <div class="ph-stripes" aria-hidden="true"></div>
      <svg class="ph-icon" width="40" height="34" viewBox="0 0 52 44" fill="none" aria-hidden="true">
        <path d="M2 20L10 12L18 20V36H2V20Z" fill="${iconColor}" opacity=".4"/>
        <rect x="7" y="26" width="6" height="10" fill="${iconColor}" opacity=".3"/>
        <path d="M14 18L26 8L38 18V38H14V18Z" fill="${iconColor}" opacity=".85" stroke="${iconColor}" stroke-width="1.2" stroke-linejoin="round"/>
        <rect x="21" y="27" width="10" height="11" fill="var(--indigo-d)" opacity=".5"/>
        <rect x="34" y="15" width="16" height="23" fill="${iconColor}" opacity=".5"/>
        <rect x="36" y="18" width="3" height="3" fill="var(--indigo-d)" opacity=".4"/>
        <rect x="41" y="18" width="3" height="3" fill="var(--indigo-d)" opacity=".4"/>
        <rect x="36" y="23" width="3" height="3" fill="var(--indigo-d)" opacity=".4"/>
        <rect x="41" y="23" width="3" height="3" fill="var(--indigo-d)" opacity=".4"/>
      </svg>
      <div class="ph-text">
        <span class="ph-org">${loc.name}</span>
        <span class="ph-region" style="color:${regionColor}">${loc.region}</span>
      </div>
    </div>`;
}

// ── CARD HTML ─────────────────────────────────────────────────────────────
function buildCardHTML(loc) {
  const tagBadges = loc.tags.map(t => {
    const cfg = TAG[t] || {};
    const isLight = cfg.color === '#FFFFFF';
    const bg   = isLight ? 'rgba(255,255,255,0.15)' : `${cfg.color}22`;
    const col  = isLight ? '#1E3A6E' : cfg.color;
    const bord = isLight ? 'rgba(30,58,110,0.3)' : `${cfg.color}55`;
    return `<span class="drawer-tag-badge" style="background:${bg};color:${col};border-color:${bord}">
      <span style="width:7px;height:7px;border-radius:50%;display:inline-block;background:${isLight ? '#1E3A6E' : cfg.color}"></span>
      ${cfg.label || t}
    </span>`;
  }).join('');

  const locationLine = [loc.city, loc.region].filter(Boolean).join(' · ');

  return `
    ${buildMediaSlot(loc)}
    <div class="drawer-tags">${tagBadges}</div>
    <div class="drawer-name">${loc.name}</div>
    ${loc.project ? `<div class="drawer-project">${loc.project}</div>` : ''}
    <div class="drawer-location">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      ${locationLine}
    </div>
    <div class="drawer-divider"></div>
    <div class="drawer-desc">${loc.desc}</div>
    ${loc.url ? `<a href="${loc.url}" target="_blank" rel="noopener" class="drawer-link">${loc.urlLabel || 'Learn More'} →</a>` : ''}
  `;
}

function openDrawer(loc) {
  drawerContent.innerHTML = buildCardHTML(loc);
  drawer.classList.add('open');
  overlay.classList.add('visible');
  drawer.setAttribute('aria-hidden', 'false');
}

function closeDrawer() {
  drawer.classList.remove('open');
  overlay.classList.remove('visible');
  drawer.setAttribute('aria-hidden', 'true');
  resetDots();
}

// ── VIDEO MODAL ───────────────────────────────────────────────────────────
function openVideoModal(loc) {
  const vid = youtubeId(loc.youtube);
  if (!vid) { openDrawer(loc); return; } // fallback if URL unparseable

  // Rebuild modal-img-wrap with iframe
  const imgWrap = document.getElementById('modalImgWrap');
  imgWrap.innerHTML = `
    <iframe
      class="video-iframe"
      id="ytIframe"
      src="https://www.youtube-nocookie.com/embed/${vid}?autoplay=1&rel=0&modestbranding=1&color=white"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen
      title="${loc.name} — video"
    ></iframe>
    <button class="modal-close" id="modalCloseBtn" aria-label="Close video">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>`;

  // Card content below video (no media slot — video is the media)
  const tagBadges = loc.tags.map(t => {
    const cfg = TAG[t] || {};
    const isLight = cfg.color === '#FFFFFF';
    const bg   = isLight ? 'rgba(255,255,255,0.15)' : `${cfg.color}22`;
    const col  = isLight ? '#1E3A6E' : cfg.color;
    const bord = isLight ? 'rgba(30,58,110,0.3)' : `${cfg.color}55`;
    return `<span class="drawer-tag-badge" style="background:${bg};color:${col};border-color:${bord}">
      <span style="width:7px;height:7px;border-radius:50%;display:inline-block;background:${isLight ? '#1E3A6E' : cfg.color}"></span>
      ${cfg.label || t}
    </span>`;
  }).join('');

  modalContent.innerHTML = `
    <div class="drawer-tags" style="padding-top:1.1rem">${tagBadges}</div>
    <div class="drawer-name">${loc.name}</div>
    ${loc.project ? `<div class="drawer-project">${loc.project}</div>` : ''}
    <div class="drawer-location">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      ${[loc.city, loc.region].filter(Boolean).join(' · ')}
    </div>
    <div class="drawer-divider"></div>
    <div class="drawer-desc">${loc.desc}</div>
    ${loc.url ? `<a href="${loc.url}" target="_blank" rel="noopener" class="drawer-link">${loc.urlLabel || 'Learn More'} →</a>` : ''}
  `;

  modal.classList.add('open', 'video');
  modal.setAttribute('aria-hidden', 'false');
  overlay.classList.add('visible');

  // Bind close on the freshly rendered button
  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
}

function closeModal() {
  // Stop video playback by clearing iframe src before animation
  const iframe = document.getElementById('ytIframe');
  if (iframe) iframe.src = '';

  modal.classList.remove('open', 'video');
  modal.setAttribute('aria-hidden', 'true');
  overlay.classList.remove('visible');
  resetDots();
}

function resetDots() {
  markerEls.forEach(m => {
    m.dot.setAttribute('r', '7');
    const c = TAG[m.loc.tags[0]]?.color || '#fff';
    m.dot.style.filter = `drop-shadow(0 2px 7px ${c}88)`;
  });
}

// ── DELEGATED CLICK ON SVG ────────────────────────────────────────────────
// Single handler at SVG level — more reliable than per-element listeners on SVG children
document.getElementById('caMap').addEventListener('click', function(e) {
  const dot = e.target;
  if (!dot.classList.contains('map-marker-dot')) return;
  const entry = markerEls.find(m => m.dot === dot);
  if (entry) handleMarkerClick(entry.loc, dot);
});

// Close handlers
document.getElementById('drawerClose').addEventListener('click', closeDrawer);

overlay.addEventListener('click', () => {
  if (drawer.classList.contains('open')) closeDrawer();
  if (modal.classList.contains('open')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (modal.classList.contains('open')) closeModal();
    else if (drawer.classList.contains('open')) closeDrawer();
  }
});

// Swipe-to-dismiss on mobile drawer
let touchStartY = 0;
drawer.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
drawer.addEventListener('touchend', e => {
  const delta = e.changedTouches[0].clientY - touchStartY;
  if (delta > 60) closeDrawer();
}, { passive: true });
</script>
